family: fastvlm
organization: Apple
architecture: decoder-only
description: "FastViT-HD hybrid vision encoder + MLP projector + Qwen2 language backbone (CVPR 2025)"
hf_base: apple

deployment_tracks:
  - rpi5    # 0.5B only, borderline — requires INT4
  - jetson
  - gpu

variants:
  - name: FastVLM-0.5B
    model_id: apple/FastVLM-0.5B
    params_M: 500            # LLM backbone Qwen2-0.5B + FastViT-HD; borderline ~500M+
    sub_500M: true           # borderline
    lm_backbone: Qwen2-0.5B
    default_quant_target: int8

  - name: FastVLM-1.5B
    model_id: apple/FastVLM-1.5B
    params_M: 1500
    sub_500M: false
    lm_backbone: Qwen2-1.5B
    default_quant_target: int4

  - name: FastVLM-7B
    model_id: apple/FastVLM-7B
    params_M: 7000
    sub_500M: false
    lm_backbone: Qwen2-7B
    default_quant_target: int4

input: [image, text]
output: text
trust_remote_code: false

notes: >
  FastViT-HD uses a 5-stage hybrid ConvNet + Transformer architecture.
  Key advantage: very low time-to-first-token vs standard ViT encoders.
  Available in MLX and CoreML formats in addition to HF transformers.

eval_benchmarks: [vqav2, textvqa, pope]
lora_target_modules: [q_proj, v_proj, k_proj, o_proj]
